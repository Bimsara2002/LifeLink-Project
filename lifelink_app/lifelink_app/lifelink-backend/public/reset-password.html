<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LifeLink - Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            padding: 40px 32px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            color: #999;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            margin-top: 4px;
            font-size: 11px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .requirements {
            margin-top: 8px;
            font-size: 11px;
            color: #999;
        }

        .requirements ul {
            margin-top: 4px;
            padding-left: 20px;
        }

        .requirements li {
            margin: 2px 0;
        }

        .requirements li.valid {
            color: #28a745;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>LifeLink</h1>
            <p>Smart Blood & Organ Management</p>
        </div>
        
        <h2>Reset Password</h2>
        <div class="subtitle">Create a new password for your account</div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">👁️</button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="requirements">
                    <div>Password must contain:</div>
                    <ul id="requirementsList">
                        <li id="reqLength">✓ At least 8 characters</li>
                        <li id="reqUpper">✓ At least 1 uppercase letter</li>
                        <li id="reqLower">✓ At least 1 lowercase letter</li>
                        <li id="reqNumber">✓ At least 1 number</li>
                    </ul>
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</button>
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="footer">
            <a href="#" onclick="window.close(); return false;">Close Window</a> • 
            <a href="http://192.168.1.4:3000">Back to App</a>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            showMessage('Invalid or missing reset token. Please request a new password reset link.', 'error');
            document.getElementById('submitBtn').disabled = true;
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        
        function checkPasswordStrength(password) {
            const strength = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password)
            };
            
            // Update requirements list
            document.getElementById('reqLength').style.color = strength.length ? '#28a745' : '#999';
            document.getElementById('reqUpper').style.color = strength.upper ? '#28a745' : '#999';
            document.getElementById('reqLower').style.color = strength.lower ? '#28a745' : '#999';
            document.getElementById('reqNumber').style.color = strength.number ? '#28a745' : '#999';
            
            // Calculate strength percentage
            let score = 0;
            if (strength.length) score += 25;
            if (strength.upper) score += 25;
            if (strength.lower) score += 25;
            if (strength.number) score += 25;
            
            // Update strength bar
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            
            fill.style.width = score + '%';
            
            if (score === 0) {
                fill.style.backgroundColor = '#e0e0e0';
                text.textContent = 'Very Weak';
                text.style.color = '#999';
            } else if (score <= 25) {
                fill.style.backgroundColor = '#dc3545';
                text.textContent = 'Weak';
                text.style.color = '#dc3545';
            } else if (score <= 50) {
                fill.style.backgroundColor = '#ffc107';
                text.textContent = 'Fair';
                text.style.color = '#ffc107';
            } else if (score <= 75) {
                fill.style.backgroundColor = '#28a745';
                text.textContent = 'Good';
                text.style.color = '#28a745';
            } else {
                fill.style.backgroundColor = '#28a745';
                text.textContent = 'Strong';
                text.style.color = '#28a745';
            }
            
            return strength.length && strength.upper && strength.lower && strength.number;
        }
        
        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });
        
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                if (type !== 'success') {
                    messageDiv.className = 'message';
                    messageDiv.textContent = '';
                }
            }, 5000);
        }
        
        // Handle form submission
        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Validate password
            if (!password || password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            // Check password strength
            if (!checkPasswordStrength(password)) {
                showMessage('Please ensure your password meets all requirements', 'error');
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Resetting...';
            
            try {
                const response = await fetch('http://192.168.1.4:3000/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        token: token, 
                        newPassword: password 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✓ Password reset successful! You can now login to the LifeLink app.', 'success');
                    submitBtn.innerHTML = '✓ Password Reset';
                    submitBtn.style.background = '#28a745';
                    
                    // Auto redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'http://192.168.1.4:3000';
                    }, 3000);
                } else {
                    showMessage('Error: ' + (data.error || 'Something went wrong'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Reset Password';
                }
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('Connection error: Unable to reach server. Please check your internet connection.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        };
        
        // Check if token is valid on load
        if (token) {
            // Optionally verify token with server
            console.log('Reset token loaded');
        }
    </script>
</body>
</html>
